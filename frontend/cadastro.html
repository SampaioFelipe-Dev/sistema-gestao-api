<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Loja de Rodas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-neomorfico">

    <div class="content">
        <div class="text">Cadastro</div>
        
        <form id="cadastroForm">
            <div class="field">
                <span class="span">👤</span>
                <input type="text" id="nome" name="nome" class="input" required placeholder=" ">
                <label for="nome" class="label">Nome Completo</label>
            </div>

            <div class="field">
                <span class="span">📧</span>
                <input type="email" id="email" name="email" class="input" required placeholder=" ">
                <label for="email" class="label">E-mail</label>
            </div>

            <div class="field">
                <span class="span">🔒</span>
                <input type="password" id="senha" name="senha" class="input" required placeholder=" ">
                <label for="senha" class="label">Crie uma Senha</label>
            </div>

            <button type="submit" id="btn-cadastrar" class="button">CADASTRAR</button>
            
            <div class="sign-up">
                Já faz parte da nossa loja? 
                <a href="login.html">Faça Login</a>
            </div>
        </form>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
