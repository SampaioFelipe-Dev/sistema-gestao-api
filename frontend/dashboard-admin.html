<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Administrador</title>
</head>
<body>
    <form id="adminForm">
        <h1>Bem-vindo ao Dashboard do Administrador</h1>
        <!-- Conteúdo do dashboard aqui -->   
         <input type="text" id="nome" name="nome" placeholder="Nome do Produto">
         <input type="text" id="descricao" name="descricao" placeholder="Descrição do Produto">
         <input type="number" id="preco" name="preco" placeholder="Preço do Produto">
         <input type="number" id="estoque" name="estoque" placeholder="Quantidade em Estoque">
         <input type="text" id="sku" name="sku" placeholder="SKU do Produto">
         <input type="text" id="foto_url" name="foto_url" placeholder="URL da Imagem do Produto">
         <button type="submit">Adicionar Produto</button>
    </form>
<script src="admin-produtos.js"></script>
</body>
</html>
