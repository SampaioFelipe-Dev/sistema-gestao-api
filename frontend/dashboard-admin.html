<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sampaio Wheels</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="dashboard-body">

    <main class="container-perfil">
        <header>
            <h1>Bem-vindo ao Dashboard do Administrador</h1>
            <p>O que você deseja gerenciar hoje, chefe?</p>
        </header>
        
<nav class="acoes-topo">
    <a href="perfil.html" class="btn-nav btn-perfil">
        👤 Meu Perfil
    </a>

    <a href="cadastrar-produto.html" class="btn-nav btn-primary">
        + Adicionar Novo Produto
    </a>

    <a href="index.html" class="btn-nav btn-secondary">
        Ver Loja
    </a>

    <button id="btn-sair-admin" class="btn-nav btn-danger">
        Sair da Conta
    </button>
</nav>

        <hr class="divisor-sessao">
        
        <section class="catalogo-admin">
            <h2>Gerenciar Catálogo</h2>
            <div id="lista-produtos-admin" class="grid-produtos-admin">
                <p>Buscando produtos...</p>
            </div>
        </section>
    </main>

    <div id="modal-editar" class="modal">
        <div class="content modal-content-largo">
            <div class="text">Editar Produto</div>
            
            <form id="form-editar-modal">
                <input type="hidden" id="edit-id">

                <div class="modal-row">
                    <label for="edit-nome">Nome:</label>
                    <input type="text" id="edit-nome" class="input-modal" required>
                </div>

                <div class="modal-row">
                    <label for="edit-sku">SKU:</label>
                    <input type="text" id="edit-sku" class="input-modal" required>
                </div>

                <div class="modal-row">
                    <label for="edit-preco">Preço (R$):</label>
                    <input type="number" step="0.01" id="edit-preco" class="input-modal" required>
                </div>

                <div class="modal-row">
                    <label for="edit-estoque">Estoque:</label>
                    <input type="number" id="edit-estoque" class="input-modal" required>
                </div>

                <div class="modal-row">
                    <label for="edit-foto_url">Link Imagem:</label>
                    <input type="text" id="edit-foto_url" class="input-modal" required>
                </div>

                <div class="modal-row">
                    <label for="edit-descricao">Descrição:</label>
                    <textarea id="edit-descricao" class="input-modal" rows="3" required></textarea>
                </div>

                <div class="botoes-modal-final">
                    <button type="submit" class="btn-confirmar">SALVAR ALTERAÇÕES</button>
                    <button type="button" id="btn-fechar-modal" class="btn-cancelar-novo">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-confirmar-exclusao" class="modal">
        <div class="content modal-content">
            <div class="text" style="color: #ff4b2b;">Atenção!</div>
            <p style="text-align: center; color: #555; margin-top: 10px;">
                Você tem certeza que deseja eliminar este produto definitivamente? Esta ação não pode ser desfeita.
            </p>
            
            <input type="hidden" id="id-produto-excluir">

            <div class="botoes-modal-final">
                <button id="btn-confirmar-delete" class="btn-confirmar" style="background-color: #ff4b2b;">
                    SIM, ELIMINAR
                </button>
                <button type="button" onclick="fecharModalExclusao()" class="btn-cancelar-novo">
                    CANCELAR
                </button>
            </div>
        </div>
    </div>

    <script src="admin-produtos.js"></script>
</body>
</html>
