<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Sampaio Wheels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-neomorfico">

    <main class="container-perfil">
        <header class="perfil-header">
            <h1 id="boas-vindas">Bem-vindo, Carregando...</h1>
            <p><strong>ID do Cliente:</strong> <span id="exibir-id">...</span></p>
        </header>

        <nav class="acoes-perfil">
            <a href="index.html" class="btn-nav">Voltar para a Loja</a>
            
            <a href="dashboard-admin.html" id="btn-admin" class="btn-nav btn-admin-gold" style="display: none;">
                👑 Painel Admin
            </a>

            <button id="btn-sair" class="btn-nav btn-danger">Sair da Conta</button>
        </nav>

        <hr class="divisor-sessao">

        <section id="historico-pedidos" class="sessao-pedidos">
            <h2>Meu Histórico de Pedidos</h2>
            <div id="container-pedidos" class="grid-pedidos">
                <p>Buscando seus pedidos...</p>
            </div>
            <div id="modal-cancelamento" class="modal-oculto">
        <div class="modal-conteudo">
            <h3>Cancelar Pedido</h3>
            <p>Poxa! Conta pra gente o motivo do cancelamento:</p>
            <textarea id="motivo-texto" rows="4" placeholder="Ex: Comprei a roda errada, me arrependi..."></textarea>
            <div class="modal-botoes">
                <button id="btn-fechar-modal-canc" class="btn-secundario">Voltar</button>
                <button id="btn-confirmar-canc" class="btn-perigo">Confirmar Cancelamento</button>
            </div>
        </div>
    </div>
        </section>
    </main>

    <script src="perfil.js"></script>
</body>
</html>
