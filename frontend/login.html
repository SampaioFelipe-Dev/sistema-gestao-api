<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sampaio Wheels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-neomorfico">

    <div class="content">
        <div class="text">Entrar</div>
        
        <form id="loginForm">
            <div class="field">
                <input type="email" id="email" class="input" required placeholder=" ">
                <span class="span">📧</span>
                <label for="email" class="label">E-mail</label>
            </div>

            <div class="field">
                <input type="password" id="senha" class="input" required placeholder=" ">
                <span class="span">🔒</span>
                <label for="senha" class="label">Senha</label>
            </div>

            <div class="forgot-pass">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="btn-entrar" class="button">ENTRAR</button>

            <div class="sign-up">
                Ainda não é membro? 
                <a href="cadastro.html">Cadastre-se agora</a>
            </div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
